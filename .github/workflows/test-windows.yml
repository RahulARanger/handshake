name: 'deploy-nodejs-reporters'

on:
  push:
    branches:
      - "cross-os-test"
    paths:
      - '**.js'
      - '**.ts'
      - '**test-windows.yml' # for testing this workflow

permissions:
    contents: write

jobs:
    cross-version-test-for-windows:
      runs-on: ${{ matrix.os }}

      strategy:
        matrix:
          os: [ 'windows-latest', 'windows-2022', 'windows-2019']

      name: cross-version-test-for-windows
      permissions: write-all

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Use Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20.9.0

        - name: Setup Turbo Repo.
          working-directory: ./handshake-nodejs-reporters
          run: npm install && npm run build

        - name: conduct sanity tests
          working-directory: ./handshake-nodejs-reporters
          run: sudo npm run sanity

        - name: generate test reports
          working-directory: ./handshake-nodejs-reporters
          run: sudo npm run export-sanity-results

        - name: verify test reports
          working-directory: ./handshake-nodejs-reporters
          run: sudo npm run verify-sanity
